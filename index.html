<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천원빵 — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0C0F;
    --surface: #111418;
    --surface2: #181C22;
    --border: #1E2430;
    --border2: #252D3A;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: rgba(201,168,76,0.12);
    --up: #2ECC8A;
    --down: #FF5C5C;
    --text: #EEF0F4;
    --text2: #8892A0;
    --text3: #4A5568;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
  }

  /* 로고 */
  .logo-wrap {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 6px;
  }
  .logo-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.3;
    margin: 12px auto 0;
  }

  /* 탭 */
  .tab-wrap {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text3);
  }
  .tab.active {
    background: var(--gold-dim);
    color: var(--gold);
  }

  /* 폼 */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--text3); }

  /* 에러 */
  .error-msg {
    font-size: 13px;
    color: var(--down);
    margin-bottom: 12px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* 버튼 */
  .btn-submit {
    width: 100%;
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-submit:hover { background: var(--gold-light); box-shadow: 0 8px 24px rgba(201,168,76,0.25); }
  .btn-submit:disabled { background: #8B6A2A; cursor: not-allowed; }

  /* 숨김 */
  .hidden { display: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .container { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">천원빵</div>
    <div class="logo-sub">종가 예측 게임</div>
    <div class="logo-divider"></div>
  </div>

  <div class="tab-wrap">
    <button class="tab active" onclick="switchMode('login')">로그인</button>
    <button class="tab" onclick="switchMode('signup')">회원가입</button>
  </div>

  <form id="form" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label class="form-label">아이디</label>
      <input class="form-input" id="아이디" type="text" maxlength="10" placeholder="최대 10자" required>
    </div>

    <div class="form-group hidden" id="field-이름">
      <label class="form-label">이름</label>
      <input class="form-input" id="이름" type="text" maxlength="50" placeholder="이름 입력">
    </div>

    <div class="form-group">
      <label class="form-label">패스워드</label>
      <input class="form-input" id="패스워드" type="password" placeholder="패스워드 입력" required>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-submit" id="btn-submit" type="submit">로그인</button>
  </form>
</div>

<script>
  const SUPABASE_URL = 'https://auronbamuigpeuymeuke.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1cm9uYmFtdWlncGV1eW1ldWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTY0MzMsImV4cCI6MjA4OTE5MjQzM30.LcZlyP7OZmp0817xpBecfCxNhjsFTqgMp06w_oz7xok'

  let mode = 'login'

  function switchMode(m) {
    mode = m
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && m === 'login') || (i === 1 && m === 'signup'))
    })
    document.getElementById('field-이름').classList.toggle('hidden', m === 'login')
    document.getElementById('이름').required = (m === 'signup')
    document.getElementById('btn-submit').textContent = m === 'login' ? '로그인' : '회원가입'
    showError('')
  }

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.classList.toggle('show', !!msg)
  }

  async function handleSubmit(e) {
    e.preventDefault()
    const btn = document.getElementById('btn-submit')
    btn.disabled = true
    btn.textContent = '처리 중...'
    showError('')

    const 아이디 = document.getElementById('아이디').value.trim()
    const 패스워드 = document.getElementById('패스워드').value
    const 이름 = document.getElementById('이름').value.trim()

    try {
      if (mode === 'signup') {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/%ED%9A%8C%EC%9B%90%EA%B8%B0%EB%B3%B8`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ 아이디, 이름, 패스워드 })
        })
        if (res.status === 409 || res.status === 23505) {
          showError('이미 사용 중인 아이디입니다.')
        } else if (!res.ok) {
          const err = await res.json()
          if (err.code === '23505') showError('이미 사용 중인 아이디입니다.')
          else showError('오류가 발생했습니다.')
        } else {
          alert('회원가입 완료! 로그인해주세요.')
          switchMode('login')
          document.getElementById('패스워드').value = ''
        }
      } else {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/%ED%9A%8C%EC%9B%90%EA%B8%B0%EB%B3%B8?%EC%95%84%EC%9D%B4%EB%94%94=eq.${encodeURIComponent(아이디)}&%ED%8C%A8%EC%8A%A4%EC%9B%8C%EB%93%9C=eq.${encodeURIComponent(패스워드)}&select=*`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY
            }
          }
        )
        const data = await res.json()
        if (!data.length) {
          showError('아이디 또는 패스워드가 올바르지 않습니다.')
        } else if (data[0]['사용여부'] === 'N') {
          showError('사용이 중지된 계정입니다.')
        } else {
          sessionStorage.setItem('user', JSON.stringify({ 아이디: data[0]['아이디'], 이름: data[0]['이름'] }))
          location.href = '/home'
        }
      }
    } catch (err) {
      showError('네트워크 오류가 발생했습니다.')
    } finally {
      btn.disabled = false
      btn.textContent = mode === 'login' ? '로그인' : '회원가입'
    }
  }
</script>
</body>
</html>
